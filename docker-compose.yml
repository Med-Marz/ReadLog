services:
  backend:
    build: ./backend
    container_name: readlog-backend
    volumes:
      - backend_data:/app/data
    expose:
      - "8000"
    environment:
      - DATABASE_URL=sqlite:///./data/readlog.db
      - CORS_ORIGINS=http://localhost:8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: readlog-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
